name: Weekly AI News Sync

on:
  schedule:
    # 毎週月曜日 JST 09:00 (UTC 00:00) に実行
    - cron: "0 0 * * 1"
  workflow_dispatch: # 手動実行も可能

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run aggregator
        run: npm start
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          ENABLED_VENDORS: ${{ secrets.ENABLED_VENDORS }}
          FEED_URL_OPENAI: ${{ secrets.FEED_URL_OPENAI }}
          FEED_URL_GOOGLE: ${{ secrets.FEED_URL_GOOGLE }}
          FEED_URL_MICROSOFT: ${{ secrets.FEED_URL_MICROSOFT }}
          FEED_URL_META: ${{ secrets.FEED_URL_META }}
          FEED_URL_ANTHROPIC: ${{ secrets.FEED_URL_ANTHROPIC }}
          HOURS_LOOKBACK: ${{ vars.HOURS_LOOKBACK || '168' }}
          MAX_ARTICLES: ${{ vars.MAX_ARTICLES || '30' }}

